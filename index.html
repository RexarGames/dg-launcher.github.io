<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REXAR GAMES Store</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0b0b;
      --panel: #151515;
      --panel-2: #1c1c1c;
      --border: rgba(255,255,255,0.08);
      --text: #f2f2f2;
      --muted: #a9a9a9;
      --yellow: #f3c316;
      --yellow-hover: #ffd84c;
      --blue-panel: #101724;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("https://i.ibb.co/gLrbwGS3/2026-03-20-181434.png") center center / cover no-repeat fixed;
      color: var(--text);
      min-height: 100vh;
    }

    html {
      scrollbar-color: #2a2a2a #0b0b0b;
      scrollbar-width: thin;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    .modal-box::-webkit-scrollbar,
    .profile-box::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    html::-webkit-scrollbar-track,
    body::-webkit-scrollbar-track,
    .modal-box::-webkit-scrollbar-track,
    .profile-box::-webkit-scrollbar-track {
      background: #0b0b0b;
    }

    html::-webkit-scrollbar-thumb,
    body::-webkit-scrollbar-thumb,
    .modal-box::-webkit-scrollbar-thumb,
    .profile-box::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 10px;
      border: 2px solid #0b0b0b;
    }

    .page {
      width: min(1200px, calc(100% - 28px));
      margin: 0 auto;
      padding: 16px 0 28px;
    }

    .search-wrap {
      position: sticky;
      top: 0;
      z-index: 30;
      background: transparent;
      padding-bottom: 0;
      margin-bottom: 10px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 52px;
      gap: 10px;
      align-items: start;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(15, 15, 15, 0.78);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      position: relative;
      min-height: 48px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .search-box svg {
      width: 18px;
      height: 18px;
      fill: #7d7d7d;
      flex-shrink: 0;
    }

    .search-box input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    .search-box input::placeholder {
      color: #7f7f7f;
    }

    .lang-box {
      position: relative;
      min-width: 52px;
      height: 48px;
    }

    .lang-toggle {
      width: 100%;
      height: 100%;
      background: rgba(15, 15, 15, 0.78);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: white;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .lang-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 140px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: none;
      z-index: 50;
    }

    .lang-menu.show {
      display: block;
    }

    .lang-option {
      width: 100%;
      background: transparent;
      color: white;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 12px 14px;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
    }

    .lang-option:last-child {
      border-bottom: none;
    }

    .lang-option:hover {
      background: rgba(255,255,255,0.06);
    }

    .top-rated-section {
      margin: 12px 0 14px;
    }

    .top-rated-card {
      width: 100%;
      border: none;
      cursor: pointer;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      min-height: 220px;
      background: #0d1320;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
      text-align: left;
      transition: 0.15s ease;
    }

    .top-rated-card:hover {
      transform: translateY(-1px);
    }

    .top-rated-bg {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      transform: scale(1.02);
    }

    .top-rated-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(5,10,20,0.92) 0%, rgba(5,10,20,0.62) 48%, rgba(5,10,20,0.22) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.08), rgba(0,0,0,0.38));
    }

    .top-rated-content {
      position: relative;
      z-index: 2;
      padding: 22px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 12px;
    }

    .top-rated-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(243,195,22,0.16);
      color: #ffe27d;
      border: 1px solid rgba(243,195,22,0.28);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .top-rated-name {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.02;
      font-weight: 900;
      color: #fff;
      max-width: 700px;
      text-shadow: 0 3px 14px rgba(0,0,0,0.35);
    }

    .top-rated-bottom {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .top-rated-genre,
    .top-rated-score,
    .top-rated-count {
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .top-rated-genre {
      background: rgba(255,255,255,0.10);
      color: #f2f2f2;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .top-rated-score {
      background: rgba(243,195,22,0.95);
      color: #171717;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .top-rated-count {
      background: rgba(0,0,0,0.34);
      color: #dfe6f3;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .suggestions {
      margin-top: 8px;
      background: #3f4658;
      border-radius: 14px;
      overflow: hidden;
      display: none;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .suggestions.show {
      display: block;
    }

    .suggestions-title {
      padding: 14px 16px 8px;
      font-size: 13px;
      font-weight: bold;
      color: #eef3ff;
    }

    .suggestion-item {
      width: 100%;
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      padding: 10px 14px;
      text-align: left;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .mini-poster {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #101010, #2a2a2a);
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 0.08em;
    }

    .mini-poster.image {
      padding: 0;
      background: #111;
    }

    .mini-poster.image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .mini-meta {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      min-width: 0;
    }

    .mini-title {
      font-size: 20px;
      line-height: 1.1;
      font-weight: bold;
    }

    .mini-sub {
      color: #d7dbea;
      font-size: 14px;
    }

    .catalog-view.hidden,
    .results-view.hidden {
      display: none;
    }

    .store-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
    }

    .left-column,
    .right-column,
    .bottom-row {
      display: grid;
      gap: 10px;
    }

    .bottom-row {
      margin-top: 10px;
      grid-template-columns: repeat(3, 1fr);
    }

    .game-tile {
      background: #e9e9e9;
      color: #111;
      border: 3px solid #1a1a1a;
      min-height: 180px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: 0.15s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .game-tile:hover {
      transform: translateY(-1px);
    }

    .game-tile.small {
      min-height: 125px;
    }

    .game-tile.bottom {
      min-height: 125px;
    }

    .tile-poster {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #161616, #2f2f2f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(18px, 3vw, 34px);
      font-weight: 900;
      letter-spacing: 0.08em;
      padding: 16px;
      text-align: center;
    }

    .tile-poster.image {
      padding: 0;
      background: #0f0f0f;
    }

    .tile-poster.image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tile-overlay {
      position: relative;
      z-index: 2;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.76));
      padding: 16px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .tile-title {
      font-size: 24px;
      line-height: 1.08;
      font-weight: bold;
      color: #fff;
    }

    .game-tile.small .tile-title,
    .game-tile.bottom .tile-title {
      font-size: 18px;
    }

    .tile-sub {
      margin-top: 6px;
      font-size: 13px;
      color: #d3d3d3;
      line-height: 1.4;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 14px;
      flex-wrap: wrap;
    }

    .results-title {
      font-size: 22px;
      font-weight: bold;
    }

    .results-count {
      color: var(--muted);
      font-size: 14px;
    }

    .results-list {
      display: grid;
      gap: 10px;
    }

    .result-item {
      width: 100%;
      display: grid;
      grid-template-columns: 220px 1fr auto;
      gap: 0;
      background: var(--blue-panel);
      border: 1px solid rgba(255,255,255,0.05);
      color: white;
      text-align: left;
      overflow: hidden;
      cursor: pointer;
    }

    .result-item:hover {
      background: #142033;
    }

    .result-poster {
      width: 100%;
      height: 100%;
      min-height: 120px;
      background: #0b1020;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 0.08em;
    }

    .result-poster.image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .result-main {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }

    .result-name {
      font-size: 22px;
      line-height: 1.1;
      font-weight: bold;
    }

    .result-genre {
      color: #cfd7e8;
      font-size: 14px;
    }

    .result-desc {
      color: #aeb7c7;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .result-side {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 130px;
      padding: 14px;
      color: #d8deeb;
      font-size: 14px;
      font-weight: bold;
    }

    .empty-state {
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      color: var(--muted);
      display: none;
    }

    .empty-state.show {
      display: block;
    }

    .modal,
    .profile-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal {
      z-index: 100;
    }

    .profile-modal {
      z-index: 130;
      background: rgba(0,0,0,0.84);
    }

    .modal.active,
    .profile-modal.active {
      display: flex;
    }

    .modal-box {
      width: min(1100px, 100%);
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      background: #151515;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
    }

    .profile-box {
      width: min(900px, 100%);
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      background: #111111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
    }

    .modal-banner {
      height: 240px;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      position: relative;
    }

    .modal-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.55)),
        linear-gradient(90deg, rgba(0,0,0,0.22), rgba(0,0,0,0.05));
    }

    .modal-head {
      padding: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: #101010;
    }

    .modal-genre {
      display: inline-block;
      background: #2a2a2a;
      color: #d4d4d4;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 30px;
      line-height: 1.08;
      font-weight: 900;
    }

    .modal-body {
      padding: 18px;
    }

    .modal-info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .meta-card {
      background: #111111;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 14px;
    }

    .meta-label {
      font-size: 12px;
      color: #8f8f8f;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: bold;
    }

    .meta-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      color: #ffd84c;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }

    .meta-link:hover {
      color: #fff2b2;
    }

    .warning-box {
      display: none;
      margin-bottom: 16px;
      background: rgba(243,195,22,0.12);
      border: 1px solid rgba(243,195,22,0.28);
      color: #ffe8a3;
      border-radius: 14px;
      padding: 14px 16px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-line;
    }

    .warning-box.show {
      display: block;
    }

    .modal-body p {
      color: #b5b5b5;
      line-height: 1.7;
      font-size: 15px;
      white-space: pre-line;
    }

    .modal-screens {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      padding: 18px;
      background: #111111;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .screen-box {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a1a, #303030);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d9d9d9;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .screen-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-buttons,
    .profile-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .btn-yellow,
    .btn-dark {
      border-radius: 12px;
      padding: 13px 18px;
      font-weight: bold;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }

    .btn-yellow {
      background: var(--yellow);
      color: #161616;
    }

    .btn-yellow:hover {
      background: var(--yellow-hover);
    }

    .btn-dark {
      background: #252525;
      color: #f0f0f0;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .code-box {
      display: none;
      margin-top: 16px;
      background: #101010;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px;
    }

    .code-box.show {
      display: block;
    }

    .code-label {
      font-size: 13px;
      color: #d7d7d7;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .code-value {
      font-family: "Courier New", monospace;
      color: #fff0a4;
      font-size: 16px;
      letter-spacing: 0.08em;
      word-break: break-all;
      margin-bottom: 8px;
    }

    .code-note {
      color: #8f8f8f;
      font-size: 13px;
      line-height: 1.55;
    }

    .profile-cover {
      height: 180px;
      position: relative;
      background:
        linear-gradient(135deg, rgba(243,195,22,0.22), rgba(28,28,28,0.92)),
        #151515 center center / cover no-repeat;
    }

    .profile-cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.55));
    }

    .profile-head {
      position: relative;
      margin-top: -52px;
      padding: 0 18px 18px;
      z-index: 2;
    }

    .profile-avatar {
      width: 104px;
      height: 104px;
      border-radius: 24px;
      background: linear-gradient(135deg, #1a1a1a, #2e2e2e);
      border: 4px solid #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      color: #ffe27d;
      box-shadow: 0 10px 26px rgba(0,0,0,0.35);
    }

    .profile-name {
      font-size: 34px;
      line-height: 1.08;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .profile-followers {
      color: #cfd7e8;
      font-size: 15px;
    }

    .profile-body {
      padding: 0 18px 18px;
    }

    .profile-section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .profile-games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .profile-game-card {
      background: #141414;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      text-align: left;
      transition: 0.15s ease;
    }

    .profile-game-card:hover {
      transform: translateY(-1px);
      background: #191919;
    }

    .profile-game-poster {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0f0f0f;
      overflow: hidden;
    }

    .profile-game-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-game-body {
      padding: 12px;
    }

    .profile-game-title {
      font-size: 16px;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .profile-game-sub {
      font-size: 13px;
      color: #b4bccd;
      line-height: 1.4;
    }

    @media (max-width: 980px) {
      .store-grid {
        grid-template-columns: 1fr;
      }

      .bottom-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .result-item {
        grid-template-columns: 180px 1fr;
      }

      .result-side {
        grid-column: 1 / -1;
        justify-content: flex-start;
        padding-top: 0;
      }

      .modal-box {
        width: min(960px, 100%);
      }
    }

    @media (max-width: 720px) {
      .modal-info-grid {
        grid-template-columns: 1fr;
      }

      .modal-banner {
        height: 180px;
      }

      .profile-name {
        font-size: 28px;
      }
    }

    @media (max-width: 640px) {
      .page {

          en: "You arrived at an old ruined house to get an album containing 10 million rubles, but it is not that simple. The house hides many secrets, and the grandfather will not let you take the album with money so easily.\n\nMove — WASD\nFlashlight on/off — LeftMouse\nInteract — E key",
          zh: "你来到一座破旧的老房子，想拿到一本装有一千万卢布的相册，但事情并没有那么简单。房子里藏着许多秘密，爷爷也不会轻易让你把装着钱的相册带走。\n\n移动 — WASD\n开关手电筒 — LeftMouse\n互动 — E 键"
        },
        code: "ALONE-2026-DXG-HOUSE",
        initials: "YA",
        featuredImage: "https://i.ibb.co/KxrkMQmQ/Sfk-Rbj.png",
        screenshots: [
          "https://i.ibb.co/KxrkMQmQ/Sfk-Rbj.png",
          "https://i.ibb.co/pjYqvmgC/6djt-P4.png",
          "https://i.ibb.co/RTYNrw0q/omf-Wv.png",
          "https://i.ibb.co/mF2nRXCg/G5g-Tjq.png",
          "https://i.ibb.co/3yvsJC3P/Pyl6oo.png"
        ],
        publisherId: "dexxure",
        developerId: "dexxure"
      },
      {
        id: "fromdarkness",
        title: {
          ru: "From The Darkness",
          en: "From The Darkness",
          zh: "来自黑暗"
        },
        genre: {
          ru: "First-Person Horror",
          en: "First-Person Horror",
          zh: "第一人称恐怖"
        },
        warning: {
          ru: "Игра содержит вспышки света, которые могут вызвать эпилептические припадки.",
          en: "This game contains flashing lights that may trigger epileptic seizures.",
          zh: "本游戏包含闪光效果，可能会引发癫痫发作。"
        },
        description: {
          ru: "From the darkness — это хоррор-игра от первого лица, в которой основное внимание уделяется созданию страха у игрока.\n\nБольшую часть времени вам предстоит ходить и исследовать заброшенную квартиру умершего дедушки, в которую вы пришли за старым семейным альбомом, но в квартире начинают твориться странные вещи, тот, кто живет во тьме, не отпустит вас так легко. Ваша главная задача — выбраться живым, но сделать это можно только встретившись лицом к лицу с обитателем тьмы.\n\nВремя прохождения игры около часа.",
          en: "From The Darkness is a first-person horror game focused on creating fear for the player.\n\nMost of the time you will walk and explore the abandoned apartment of your deceased grandfather, where you came for an old family album, but strange things begin to happen in the apartment, and the one who lives in the darkness will not let you go so easily. Your main task is to escape alive, but you can do this only by meeting the dweller of the darkness face to face.\n\nThe game takes about one hour to complete.",
          zh: "《来自黑暗》是一款第一人称恐怖游戏，重点在于为玩家营造强烈的恐惧感。\n\n大部分时间里，你需要在已故祖父那间废弃公寓中行走并探索。你来到这里是为了寻找一本旧的家庭相册，但公寓里开始发生诡异的事情，栖身于黑暗中的存在不会轻易放你离开。你的主要任务是活着逃出去，但做到这一点的唯一方式，就是直面黑暗中的住民。\n\n通关时间大约为一小时。"
        },
        code: "DARKNESS-2026-N4BA-HOUR",
        initials: "FD",
        featuredImage: "https://i.ibb.co/ZRDRjD1V/header.jpg",
        screenshots: [
          "https://i.ibb.co/ZRDRjD1V/header.jpg",
          "https://i.ibb.co/TJxmgcm/ss-f6d3678fe4d4a6bc7ed18cdae365734e8087858f-1920x1080.jpg",
          "https://i.ibb.co/C3Qfc66f/ss-dde0b6e78529e674ba434d1172879ae76aa566e5-1920x1080.jpg",
          "https://i.ibb.co/s9BMkQ3t/ss-5e008b1df54cdbf159621636eb09a585315756a3-1920x1080.jpg",
          "https://i.ibb.co/DD3RZhq0/ss-ac05c6f0fa35086a6b29e17b596a7143c7067289-1920x1080.jpg",
          "https://i.ibb.co/4gwsLG3z/ss-a52dd386ab0826d4bc46fb5b74952a7da10cedff-1920x1080.jpg",
          "https://i.ibb.co/svFVGRS5/ss-e9fd13c104b7b82e8434e76aed5ced17455740f0-1920x1080.jpg",
          "https://i.ibb.co/S4SSHVW1/ss-e76b1af321d37f2566438094b5bad47c446bee86-1920x1080.jpg"
        ],
        publisherId: "n4ba",
        developerId: "n4ba"
      }
    ];

    const featuredId = "mishani";
    const sideIds = ["ozon", "shadow"];
    const bottomIds = ["toilet", "skuf", "fear", "neighbor", "youarealone", "fromdarkness"];
    const topRatedGameId = "ozon";

    const searchInput = document.getElementById("searchInput");
    const suggestionsBox = document.getElementById("suggestionsBox");
    const suggestionsList = document.getElementById("suggestionsList");
    const suggestionsTitle = document.getElementById("suggestionsTitle");
    const leftColumn = document.getElementById("leftColumn");
    const rightColumn = document.getElementById("rightColumn");
    const bottomRow = document.getElementById("bottomRow");
    const emptyState = document.getElementById("emptyState");
    const catalogView = document.getElementById("catalogView");
    const resultsView = document.getElementById("resultsView");
    const resultsList = document.getElementById("resultsList");
    const resultsCount = document.getElementById("resultsCount");
    const resultsTitle = document.getElementById("resultsTitle");

    const topRatedSection = document.getElementById("topRatedSection");
    const topRatedCard = document.getElementById("topRatedCard");
    const topRatedBg = document.getElementById("topRatedBg");
    const topRatedKicker = document.getElementById("topRatedKicker");
    const topRatedName = document.getElementById("topRatedName");
    const topRatedGenre = document.getElementById("topRatedGenre");
    const topRatedScore = document.getElementById("topRatedScore");
    const topRatedCount = document.getElementById("topRatedCount");

    const modal = document.getElementById("gameModal");
    const modalBanner = document.getElementById("modalBanner");
    const modalGenre = document.getElementById("modalGenre");
    const modalTitle = document.getElementById("modalTitle");
    const modalDescription = document.getElementById("modalDescription");
    const modalWarning = document.getElementById("modalWarning");
    const modalPublisherBtn = document.getElementById("modalPublisherBtn");
    const modalDeveloperBtn = document.getElementById("modalDeveloperBtn");
    const publisherLabel = document.getElementById("publisherLabel");
    const developerLabel = document.getElementById("developerLabel");
    const modalScreens = document.getElementById("modalScreens");
    const modalCode = document.getElementById("modalCode");
    const codeBox = document.getElementById("codeBox");
    const getCodeBtn = document.getElementById("getCodeBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const codeLabel = document.getElementById("codeLabel");
    const codeNote = document.getElementById("codeNote");

    const profileModal = document.getElementById("profileModal");
    const profileCover = document.getElementById("profileCover");
    const profileAvatar = document.getElementById("profileAvatar");
    const profileName = document.getElementById("profileName");
    const profileFollowers = document.getElementById("profileFollowers");
    const profileGamesTitle = document.getElementById("profileGamesTitle");
    const profileGamesGrid = document.getElementById("profileGamesGrid");
    const closeProfileBtn = document.getElementById("closeProfileBtn");

    const langToggle = document.getElementById("langToggle");
    const langMenu = document.getElementById("langMenu");

    let currentCode = "";

    function tGame(obj) {
      if (typeof obj === "string") return obj;
      return obj[currentLang] || obj.ru || obj.en || "";
    }

    function getProfile(profileId) {
      return profiles[profileId];
    }

    function tProfileName(profileId) {
      const profile = getProfile(profileId);
      return profile ? tGame(profile.name) : "";
    }

    function applyLanguage() {
      const t = ui[currentLang];
      searchInput.placeholder = t.search;
      suggestionsTitle.textContent = t.suggestions;
      resultsTitle.textContent = t.results;
      getCodeBtn.textContent = t.getCode;
      closeModalBtn.textContent = t.close;
      codeLabel.textContent = t.codeLabel;
      codeNote.textContent = t.codeNote;
      emptyState.textContent = t.empty;
      topRatedKicker.textContent = t.topRated;
      publisherLabel.textContent = t.publisher;
      developerLabel.textContent = t.developer;
      profileGamesTitle.textContent = t.gamesTitle;
      closeProfileBtn.textContent = t.closeProfile;
      langToggle.textContent = currentLang.toUpperCase();
      renderTopRated();
    }

    function getGame(id) {
      return games.find(game => game.id === id);
    }

    function renderTopRated() {
      const t = ui[currentLang];
      const game = getGame(topRatedGameId);
      if (!game) return;

      topRatedName.textContent = tGame(game.title);
      topRatedGenre.textContent = tGame(game.genre);
      topRatedScore.textContent = `${t.rating}: ${game.rating.toFixed(1)} / 5`;
      topRatedCount.textContent = `${game.ratingCount} ${t.votes}`;
      topRatedBg.style.backgroundImage = `url("${game.featuredImage}")`;
    }

    function makePoster(game) {
      if (game.featuredImage) {
        return `
          <div class="tile-poster image">
            <img src="${game.featuredImage}" alt="${tGame(game.title)}">
          </div>
        `;
      }
      return `<div class="tile-poster">${game.initials}</div>`;
    }

    function makeMiniPoster(game) {
      if (game.featuredImage) {
        return `
          <div class="mini-poster image">
            <img src="${game.featuredImage}" alt="${tGame(game.title)}">
          </div>
        `;
      }
      return `<div class="mini-poster">${game.initials}</div>`;
    }

    function makeResultPoster(game) {
      if (game.featuredImage) {
        return `
          <div class="result-poster image">
            <img src="${game.featuredImage}" alt="${tGame(game.title)}">
          </div>
        `;
      }
      return `<div class="result-poster">${game.initials}</div>`;
    }

    function createTile(game, extraClass = "") {
      return `
        <button class="game-tile ${extraClass}" type="button" data-game-id="${game.id}">
          ${makePoster(game)}
          <div class="tile-overlay">
            <div class="tile-title">${tGame(game.title)}</div>
            <div class="tile-sub">${tGame(game.genre)}</div>
          </div>
        </button>
      `;
    }

    function attachGameTileEvents() {
      document.querySelectorAll(".game-tile").forEach(btn => {
        btn.addEventListener("click", () => {
          const game = getGame(btn.dataset.gameId);
          if (game) openModal(game);
        });
      });
    }

    function renderCatalog(filtered = games) {
      const featured = filtered.find(g => g.id === featuredId);
      const sides = sideIds.map(getGame).filter(Boolean).filter(g => filtered.some(f => f.id === g.id));
      const bottoms = bottomIds.map(getGame).filter(Boolean).filter(g => filtered.some(f => f.id === g.id));

      leftColumn.innerHTML = featured ? createTile(featured, "") : "";
      rightColumn.innerHTML = sides.map(game => createTile(game, "small")).join("");
      bottomRow.innerHTML = bottoms.map(game => createTile(game, "bottom")).join("");

      attachGameTileEvents();
    }

    function renderList(filtered = games) {
      resultsCount.textContent = `${ui[currentLang].found}: ${filtered.length}`;

      resultsList.innerHTML = filtered.map(game => `
        <button class="result-item" type="button" data-game-id="${game.id}">
          ${makeResultPoster(game)}
          <div class="result-main">
            <div class="result-name">${tGame(game.title)}</div>
            <div class="result-genre">${tGame(game.genre)}</div>
            <div class="result-desc">${tGame(game.description)}</div>
          </div>
          <div class="result-side">${ui[currentLang].open}</div>
        </button>
      `).join("");

      document.querySelectorAll(".result-item").forEach(btn => {
        btn.addEventListener("click", () => {
          const game = getGame(btn.dataset.gameId);
          if (game) openModal(game);
        });
      });
    }

    function showCatalogView() {
      catalogView.classList.remove("hidden");
      resultsView.classList.add("hidden");
      emptyState.classList.remove("show");
      topRatedSection.style.display = "";
    }

    function showResultsView(filtered) {
      topRatedSection.style.display = "none";
      catalogView.classList.add("hidden");
      resultsView.classList.remove("hidden");

      if (!filtered.length) {
        resultsView.classList.add("hidden");
        emptyState.classList.add("show");
        return;
      }

      emptyState.classList.remove("show");
      renderList(filtered);
    }

    function renderSuggestions(query) {
      const q = query.trim().toLowerCase();
      if (!q) {
        suggestionsBox.classList.remove("show");
        suggestionsList.innerHTML = "";
        return;
      }

      const found = games.filter(game => {
        const haystack = `${tGame(game.title)} ${tGame(game.genre)} ${tGame(game.description)} ${game.id}`.toLowerCase();
        return haystack.includes(q);
      }).slice(0, 5);

      if (!found.length) {
        suggestionsBox.classList.remove("show");
        suggestionsList.innerHTML = "";
        return;
      }

      suggestionsList.innerHTML = found.map(game => `
        <button class="suggestion-item" type="button" data-game-id="${game.id}">
          ${makeMiniPoster(game)}
          <div class="mini-meta">
            <div class="mini-title">${tGame(game.title)}</div>
            <div class="mini-sub">${tGame(game.genre)}</div>
          </div>
        </button>
      `).join("");

      suggestionsBox.classList.add("show");

      suggestionsList.querySelectorAll(".suggestion-item").forEach(item => {
        item.addEventListener("click", () => {
          const game = getGame(item.dataset.gameId);
          if (!game) return;
          searchInput.value = tGame(game.title);
          suggestionsBox.classList.remove("show");
          showResultsView([game]);
        });
      });
    }

    function openModal(game) {
      modalGenre.textContent = tGame(game.genre);
      modalTitle.textContent = tGame(game.title);
      modalDescription.textContent = tGame(game.description);
      modalCode.textContent = game.code;
      currentCode = game.code;

      modalPublisherBtn.textContent = tProfileName(game.publisherId);
      modalPublisherBtn.dataset.profileId = game.publisherId;
      modalDeveloperBtn.textContent = tProfileName(game.developerId);
      modalDeveloperBtn.dataset.profileId = game.developerId;

      if (game.warning) {
        modalWarning.textContent = tGame(game.warning);
        modalWarning.classList.add("show");
      } else {
        modalWarning.textContent = "";
        modalWarning.classList.remove("show");
      }

      if (game.featuredImage) {
        modalBanner.style.backgroundImage = `url("${game.featuredImage}")`;
      } else {
        modalBanner.style.backgroundImage = "linear-gradient(135deg, #181818, #303030)";
      }

      codeBox.classList.remove("show");

      if (game.screenshots && game.screenshots.length) {
        modalScreens.innerHTML = game.screenshots.map(src => `
          <div class="screen-box">
            <img src="${src}" alt="${tGame(game.title)}">
          </div>
        `).join("");
      } else {
        modalScreens.innerHTML = `
          <div class="screen-box">${game.initials} 1</div>
          <div class="screen-box">${game.initials} 2</div>
        `;
      }

      modal.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      modal.classList.remove("active");
      if (!profileModal.classList.contains("active")) {
        document.body.style.overflow = "";
      }
      codeBox.classList.remove("show");
    }

    function openProfile(profileId) {
      const profile = getProfile(profileId);
      if (!profile) return;

      const profileGames = games.filter(game =>
        game.publisherId === profileId || game.developerId === profileId
      );

      profileAvatar.textContent = profile.initials;
      profileName.textContent = tGame(profile.name);
      profileFollowers.textContent = `${profile.followers} ${ui[currentLang].followers}`;

      if (profileGames.length && profileGames[0].featuredImage) {
        profileCover.style.background = `
          linear-gradient(135deg, rgba(243,195,22,0.22), rgba(28,28,28,0.92)),
          url("${profileGames[0].featuredImage}") center center / cover no-repeat
        `;
      } else {
        profileCover.style.background = `
          linear-gradient(135deg, rgba(243,195,22,0.22), rgba(28,28,28,0.92)),
          #151515
        `;
      }

      profileGamesGrid.innerHTML = profileGames.map(game => `
        <button class="profile-game-card" type="button" data-game-id="${game.id}">
          <div class="profile-game-poster">
            <img src="${game.featuredImage}" alt="${tGame(game.title)}">
          </div>
          <div class="profile-game-body">
            <div class="profile-game-title">${tGame(game.title)}</div>
            <div class="profile-game-sub">${tGame(game.genre)}</div>
          </div>
        </button>
      `).join("");

      profileGamesGrid.querySelectorAll(".profile-game-card").forEach(card => {
        card.addEventListener("click", () => {
          const game = getGame(card.dataset.gameId);
          closeProfile();
          if (game) openModal(game);
        });
      });

      profileModal.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    function closeProfile() {
      profileModal.classList.remove("active");
      if (!modal.classList.contains("active")) {
        document.body.style.overflow = "";
      }
    }

    topRatedCard.addEventListener("click", () => {
      const game = getGame(topRatedGameId);
      if (game) openModal(game);
    });

    modalPublisherBtn.addEventListener("click", () => {
      const profileId = modalPublisherBtn.dataset.profileId;
      if (profileId) openProfile(profileId);
    });

    modalDeveloperBtn.addEventListener("click", () => {
      const profileId = modalDeveloperBtn.dataset.profileId;
      if (profileId) openProfile(profileId);
    });

    searchInput.addEventListener("input", () => {
      const value = searchInput.value.trim().toLowerCase();

      renderSuggestions(value);

      if (!value) {
        showCatalogView();
        renderCatalog(games);
        return;
      }

      const filtered = games.filter(game => {
        const haystack = `${tGame(game.title)} ${tGame(game.genre)} ${tGame(game.description)} ${game.id}`.toLowerCase();
        return haystack.includes(value);
      });

      showResultsView(filtered);
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const value = searchInput.value.trim().toLowerCase();

        if (!value) {
          showCatalogView();
          renderCatalog(games);
          suggestionsBox.classList.remove("show");
          return;
        }

        const filtered = games.filter(game => {
          const haystack = `${tGame(game.title)} ${tGame(game.genre)} ${tGame(game.description)} ${game.id}`.toLowerCase();
          return haystack.includes(value);
        });

        showResultsView(filtered);
        suggestionsBox.classList.remove("show");
      }
    });

    langToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      langMenu.classList.toggle("show");
    });

    document.querySelectorAll(".lang-option").forEach(btn => {
      btn.addEventListener("click", () => {
        currentLang = btn.dataset.lang;
        applyLanguage();
        langMenu.classList.remove("show");

        const value = searchInput.value.trim().toLowerCase();
        renderCatalog(games);

        if (value) {
          const filtered = games.filter(game => {
            const haystack = `${tGame(game.title)} ${tGame(game.genre)} ${tGame(game.description)} ${game.id}`.toLowerCase();
            return haystack.includes(value);
          });

          if (!resultsView.classList.contains("hidden")) {
            showResultsView(filtered);
          }

          if (suggestionsBox.classList.contains("show")) {
            renderSuggestions(value);
          }
        }

        if (modal.classList.contains("active")) {
          const openGame = games.find(game => game.code === currentCode);
          if (openGame) openModal(openGame);
        }
      });
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search-wrap")) {
        suggestionsBox.classList.remove("show");
      }
      if (!e.target.closest(".lang-box")) {
        langMenu.classList.remove("show");
      }
      if (e.target === modal) {
        closeModal();
      }
      if (e.target === profileModal) {
        closeProfile();
      }
    });

    getCodeBtn.addEventListener("click", () => {
      if (!currentCode) return;
      codeBox.classList.add("show");
    });

    closeModalBtn.addEventListener("click", closeModal);
    closeProfileBtn.addEventListener("click", closeProfile);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (profileModal.classList.contains("active")) {
          closeProfile();
          return;
        }
        if (modal.classList.contains("active")) {
          closeModal();
        }
      }
    });

    applyLanguage();
    renderCatalog(games);
    renderTopRated();
    showCatalogView();
  </script>
</body>
</html>
